# Pełny stack: agent (submoduł jarvis1net) + MCP (Python) w jednym kontenerze (stdio).
# Instalacja: README.md → „Instalacja: pełny stos Docker (zalecane)”.
#
# 1. cp agent-jarvis1net/.env.example .env  — uzupełnij klucze
# 2. docker compose build && docker compose up -d
# 3. Logi: docker compose logs -f   |  dane: wolumen jarvis_data → /app/data

services:
  jarvis1net:
    image: stack-jarvis1net
    container_name: stack-jarvis1net
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    # Nadpisuje ścieżki z .env skopiowane z hosta: MSAL, microsoft_agent_settings.json, session, audyt
    # MUSZĄ leżeć w wolumenie jarvis_data → /app/data, inaczej znikną po recreate kontenera.
    environment:
      AUDIT_LOG_PATH: /app/data/audit.jsonl
      MICROSOFT_TOKEN_CACHE_PATH: /app/data/ms_graph_token_cache.json
      SESSION_CONTEXT_PATH: /app/data/session_paths.json
    restart: unless-stopped
    volumes:
      - jarvis_data:/app/data
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: stack-jarvis1net-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant Web UI + REST API (only loopback — use SSH tunnel from your laptop if VPS is remote)
    ports:
      - "127.0.0.1:6333:6333"

volumes:
  jarvis_data:
  qdrant_data:
